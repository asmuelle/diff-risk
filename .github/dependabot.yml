version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      syn-ecosystem:
        patterns: ["syn", "quote", "proc-macro2"]
      serde-ecosystem:
        patterns: ["serde", "serde_*"]
      tokio-ecosystem:
        patterns: ["tokio", "tokio-*"]
      tracing-ecosystem:
        patterns: ["tracing", "tracing-*"]
      patch-updates:
        update-types: ["patch"]
    ignore:
      # Pin major bumps behind explicit review — they often need spec changes.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "07:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
